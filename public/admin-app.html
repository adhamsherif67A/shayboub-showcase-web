<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Shayboub Admin</title>
  
  <!-- iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Shayboub Admin">
  <link rel="apple-touch-icon" href="/images/shayboub-logo.png">
  
  <!-- Theme -->
  <meta name="theme-color" content="#1e293b">
  
  <!-- Manifest for admin -->
  <link rel="manifest" href="/manifest-admin.json">
  
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 400px;
      text-align: center;
    }
    .logo {
      width: 100px;
      height: 100px;
      border-radius: 20px;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h1 {
      font-size: 24px;
      margin: 0 0 8px;
    }
    .subtitle {
      color: #94a3b8;
      margin: 0 0 32px;
      font-size: 14px;
    }
    .instructions {
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
      text-align: left;
    }
    .instructions h2 {
      font-size: 16px;
      margin: 0 0 16px;
      color: #60a5fa;
    }
    .step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }
    .step:last-child {
      margin-bottom: 0;
    }
    .step-number {
      background: #3b82f6;
      color: white;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      flex-shrink: 0;
    }
    .step-text {
      font-size: 14px;
      line-height: 1.5;
    }
    .step-text strong {
      color: #60a5fa;
    }
    .icon {
      display: inline-block;
      vertical-align: middle;
    }
    .note {
      margin-top: 24px;
      padding: 16px;
      background: rgba(59, 130, 246, 0.2);
      border-radius: 12px;
      font-size: 13px;
      color: #93c5fd;
    }
    .loader {
      display: none;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    /* When running as PWA, show loader and redirect */
    .is-pwa .instructions { display: none; }
    .is-pwa .loader { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <img src="/images/shayboub-logo.png" alt="Shayboub" class="logo">
    <h1>Shayboub Admin</h1>
    <p class="subtitle">Install the admin panel on your device</p>
    
    <div class="instructions">
      <h2>📱 Add to Home Screen</h2>
      
      <div class="step">
        <div class="step-number">1</div>
        <div class="step-text">
          Tap the <strong>Share</strong> button 
          <span class="icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2">
              <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
              <polyline points="16 6 12 2 8 6"/>
              <line x1="12" y1="2" x2="12" y2="15"/>
            </svg>
          </span>
          at the bottom of Safari
        </div>
      </div>
      
      <div class="step">
        <div class="step-number">2</div>
        <div class="step-text">
          Scroll down and tap <strong>"Add to Home Screen"</strong>
          <span class="icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <line x1="12" y1="8" x2="12" y2="16"/>
              <line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
          </span>
        </div>
      </div>
      
      <div class="step">
        <div class="step-number">3</div>
        <div class="step-text">
          Tap <strong>"Add"</strong> in the top right corner
        </div>
      </div>
    </div>
    
    <div class="note">
      ✨ Once installed, the admin panel will open as a full-screen app!
    </div>
    
    <div class="loader">
      <div class="spinner"></div>
      <p>Loading Admin Panel...</p>
    </div>
  </div>
  
  <script>
    // Check if running as installed PWA (standalone mode)
    var isStandalone = window.navigator.standalone === true || 
                       window.matchMedia('(display-mode: standalone)').matches;
    
    if (isStandalone) {
      // Running as PWA - redirect to admin
      document.body.classList.add('is-pwa');
      window.location.replace('/admin');
    }
    // If not standalone, stay on this page so user can add to home screen
  </script>
</body>
</html>
