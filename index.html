    <!-- Dynamic manifest and theme for admin routes -->
    <script>
      (function() {
        var isAdmin = window.location.pathname.startsWith('/admin') || window.location.pathname.startsWith('/staff');
        if (isAdmin) {
          // Update manifest
          document.getElementById('manifest-link').href = '/manifest-admin.json';
          // Update theme color
          document.getElementById('theme-color-meta').content = '#1e293b';
          // Update apple title
          document.getElementById('apple-title').content = 'Shayboub Admin';
        }
      })();
    </script>
    
    <!-- iOS PWA Admin Redirect Fix - ONLY for installed PWA apps -->
    <script>
      (function() {
        // ONLY check for iOS standalone mode (navigator.standalone is true ONLY on iOS PWA)
        var isIOSPWA = window.navigator.standalone === true;
        // For Android/Chrome PWA
        var isAndroidPWA = window.matchMedia('(display-mode: standalone)').matches && 
                           !window.navigator.userAgent.includes('Safari');
        
        var isInstalledPWA = isIOSPWA || isAndroidPWA;
        
        var currentPath = window.location.pathname;
        var savedAdminRoute = localStorage.getItem('shayboub-admin-pwa-route');
        
        // If on admin page, save it for PWA
        if (currentPath.startsWith('/admin') || currentPath.startsWith('/staff')) {
          localStorage.setItem('shayboub-admin-pwa-route', currentPath);
        }
        
        // ONLY redirect if truly in an installed PWA (not regular browser)
        if (isInstalledPWA && (currentPath === '/' || currentPath === '')) {
          if (savedAdminRoute && savedAdminRoute.startsWith('/admin')) {
            window.location.replace(savedAdminRoute);
          }
        }
      })();
    </script>

  <body>
    <div id="root">
      <!-- Initial loading state for better perceived performance -->
      <style>
        #initial-loader {
          position: fixed;
          inset: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #faf8f5;
          z-index: 9999;
          transition: opacity 0.3s ease;
        }
        #initial-loader.fade-out {
          opacity: 0;
          pointer-events: none;
        }
        .loader-spinner {
          width: 48px;
          height: 48px;
          border: 4px solid #e5e7eb;
          border-top-color: #ea580c;
          border-radius: 50%;
          animation: spin 1s linear infinite;
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
      </style>
      <div id="initial-loader">
        <div class="loader-spinner"></div>
      </div>
      <script>
        // Remove loader when React mounts
        window.addEventListener('DOMContentLoaded', function() {
          var loader = document.getElementById('initial-loader');
          if (loader) {
            // Give React a moment to render
            setTimeout(function() {
              loader.classList.add('fade-out');
              setTimeout(function() {
                loader.remove();
              }, 300);
            }, 100);
          }
        });
      </script>
    </div>
